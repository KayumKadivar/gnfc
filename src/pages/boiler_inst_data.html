<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instrument Data | GNFC</title>
  <link rel="stylesheet" href="/src/css/ios-fonts.css">
  <link rel="stylesheet" href="/src/css/typography.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="/src/js/tailwind_config.js"></script>
  <script>window.activePage = 'plants';</script>
  <style>
    .form-section {
      background: rgba(15, 23, 42, 0.3);
      border: 1px solid var(--app-border, #2c3235);
      border-radius: 0.75rem;
      padding: 1.25rem;
      margin-bottom: 1.25rem;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .form-group-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--app-muted, #9aa7b5);
      margin-bottom: 0.375rem;
    }

    .form-input {
      width: 100%;
      height: 2.25rem;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid var(--app-border, #2c3235);
      border-radius: 0.375rem;
      padding: 0 0.875rem;
      color: var(--app-text, #e6edf3);
      font-size: 0.875rem;
      font-weight: 500;
      outline: none;
      transition: all 0.2s ease;
    }

    .form-input:focus {
      border-color: #5794f2;
      box-shadow: 0 0 0 3px rgba(87, 148, 242, 0.15);
      background: rgba(15, 23, 42, 0.8);
    }

    .form-input[readonly] {
      background: rgba(255, 255, 255, 0.02);
      color: var(--app-muted, #9aa7b5);
      cursor: not-allowed;
      border-style: dashed;
    }

    .section-title {
      font-size: 0.8125rem;
      font-weight: 800;
      color: #5794f2;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--app-border, #2c3235), transparent);
    }

    /* --- Action Toolbar --- */
    .action-toolbar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.375rem;
      padding: 0.625rem 1rem;
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.6) 0%, rgba(30, 41, 59, 0.5) 100%);
      border: 1px solid var(--app-border, #2c3235);
      border-radius: 0.75rem;
      flex-wrap: wrap;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .toolbar-divider {
      width: 1px;
      height: 1.75rem;
      background: var(--app-border, #2c3235);
      margin: 0 0.25rem;
    }

    .action-button {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      height: 2.25rem;
      padding: 0 0.875rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 0.375rem;
      color: var(--app-text, #e6edf3);
      font-size: 0.8125rem;
      font-weight: 700;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: 0.01em;
    }

    .action-button i {
      font-size: 0.9375rem;
      opacity: 0.8;
    }

    .action-button:hover {
      background: rgba(87, 148, 242, 0.12);
      border-color: rgba(87, 148, 242, 0.35);
      color: #73b0ff;
      transform: translateY(-1px);
      box-shadow: 0 2px 8px -2px rgba(87, 148, 242, 0.2);
    }

    .action-button:hover i {
      opacity: 1;
    }

    .action-button:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .action-button.btn-add {
      background: linear-gradient(135deg, #059669 0%, #10b981 100%);
      border: none;
      color: #ffffff;
      box-shadow: 0 2px 8px -2px rgba(16, 185, 129, 0.4);
    }

    .action-button.btn-add:hover {
      background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
      box-shadow: 0 4px 12px -2px rgba(16, 185, 129, 0.5);
      color: #ffffff;
    }

    .action-button.btn-edit {
      background: linear-gradient(135deg, #d97706 0%, #f59e0b 100%);
      border: none;
      color: #ffffff;
      box-shadow: 0 2px 8px -2px rgba(245, 158, 11, 0.4);
    }

    .action-button.btn-edit:hover {
      background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
      box-shadow: 0 4px 12px -2px rgba(245, 158, 11, 0.5);
      color: #ffffff;
    }

    .action-button.btn-delete {
      background: linear-gradient(135deg, #dc2626 0%, #ef4444 100%);
      border: none;
      color: #ffffff;
      box-shadow: 0 2px 8px -2px rgba(239, 68, 68, 0.4);
    }

    .action-button.btn-delete:hover {
      background: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
      box-shadow: 0 4px 12px -2px rgba(239, 68, 68, 0.5);
      color: #ffffff;
    }

    .action-button.btn-primary {
      background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
      border: none;
      color: #fff;
      box-shadow: 0 2px 8px -2px rgba(59, 130, 246, 0.4);
    }

    .action-button.btn-primary:hover {
      background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
      box-shadow: 0 4px 12px -2px rgba(59, 130, 246, 0.5);
      color: #ffffff;
    }

    .theme-card-shadow {
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    html[data-theme-mode="light"] .theme-card-shadow {
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
    }

    /* Light Theme Overrides */
    html[data-theme-mode="light"] .action-toolbar {
      background: #ffffff;
      border-color: #d6deea;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
    }

    html[data-theme-mode="light"] .toolbar-divider {
      background: #cbd5e1;
    }

    html[data-theme-mode="light"] .form-section {
      background: #ffffff;
      border-color: #d6deea;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
    }

    html[data-theme-mode="light"] .form-group-label {
      color: #64748b;
    }

    html[data-theme-mode="light"] .form-input {
      background: #f8fafc;
      border-color: #cbd5e1;
      color: #1e293b;
    }

    html[data-theme-mode="light"] .form-input:focus {
      background: #ffffff;
    }

    html[data-theme-mode="light"] .form-input[readonly] {
      background: #f1f5f9;
      color: #94a3b8;
    }

    html[data-theme-mode="light"] .action-button {
      background: #ffffff;
      border-color: #d1d5db;
      color: #374151;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    html[data-theme-mode="light"] .action-button:hover {
      background: #eff6ff;
      border-color: #93c5fd;
      color: #2563eb;
    }

    html[data-theme-mode="light"] .action-button.btn-add {
      background: linear-gradient(135deg, #059669 0%, #10b981 100%);
      color: #ffffff;
      border: none;
    }

    html[data-theme-mode="light"] .action-button.btn-edit {
      background: linear-gradient(135deg, #d97706 0%, #f59e0b 100%);
      color: #ffffff;
      border: none;
    }

    html[data-theme-mode="light"] .action-button.btn-delete {
      background: linear-gradient(135deg, #dc2626 0%, #ef4444 100%);
      color: #ffffff;
      border: none;
    }

    html[data-theme-mode="light"] .action-button.btn-primary {
      background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
      color: #ffffff;
      border: none;
    }

    /* SweetAlert2 above modals */
    .swal2-container {
      z-index: 99999 !important;
    }
  </style>
</head>

<body class="bg-dark-bg color-primary h-screen flex overflow-hidden font-sans">

  <script src="/src/js/theme_manager.js"></script>
  <script src="/src/js/sidebar.js"></script>
  <div id="sidebar-container"></div>
  <script>renderSidebar('plants');</script>

  <main class="flex-1 flex flex-col h-screen overflow-hidden">

    <div id="header-container"></div>
    <script src="/src/js/header.js"></script>
    <script>
      renderHeader({
        title: "Instrument Data",
        breadcrumbs: [
          { label: "Plant", href: "/src/pages/plant_status.html" },
          { label: "Boiler", href: "/src/pages/boiler_dashboard.html" },
          { label: "Inst Data" }
        ],
        backLink: "/src/pages/boiler_dashboard.html"
      });
    </script>

    <div class="flex-1 overflow-y-auto p-4 md:p-6 bg-dark-bg">
      <div class="max-w-8xl mx-auto space-y-4">

        <!-- Action Toolbar -->
        <div class="action-toolbar">
          <button class="action-button" onclick="openJobHistoryModal()"><i
              class="ph-bold ph-clock-counter-clockwise"></i> Job History</button>
          <button class="action-button"
            onclick="window.location.href='/src/pages/boiler_jb_detail.html?tag=' + encodeURIComponent(document.getElementById('f-tag_no')?.value || 'L_110VDCBF')"><i
              class="ph-bold ph-list-dashes"></i> JS Detail</button>
          <span class="toolbar-divider"></span>
          <button class="action-button btn-add" onclick="window.location.href='/src/pages/boiler_inst_add.html'"><i
              class="ph-bold ph-plus"></i>
            Add</button>
          <button class="action-button btn-edit" onclick="showEditForm()"><i class="ph-bold ph-pencil-simple"></i>
            Edit</button>
          <button class="action-button btn-delete"><i class="ph-bold ph-trash"></i> Delete</button>
          <span class="toolbar-divider"></span>
          <button class="action-button" onclick="window.location.href='/src/pages/boiler_loop_data.html'"><i
              class="ph-bold ph-arrows-clockwise"></i> Loop Data</button>
          <button class="action-button" onclick="window.location.href='/src/pages/boiler_search_tag.html'"><i
              class="ph-bold ph-magnifying-glass"></i> Search Tag</button>
        </div>

        <!-- Search & Filters -->
        <div
          class="bg-dark-panel border border-dark-border rounded-xl p-4 flex flex-wrap items-end gap-4 theme-card-shadow">
          <div class="flex-1 min-w-[250px] relative" id="tag-search-container">
            <label class="form-group-label">Find Tag</label>
            <div class="relative flex items-center">
              <input type="text" id="tag-search-input" class="form-input pl-10 pr-10 font-bold"
                placeholder="Enter Tag No..." autocomplete="off">
              <i class="ph-bold ph-magnifying-glass absolute left-3.5 color-secondary font-16px"></i>
              <button id="tag-dropdown-btn"
                class="absolute right-2.5 w-7 h-7 flex items-center justify-center rounded hover:bg-white/10 color-secondary transition-colors">
                <i class="ph-bold ph-caret-down font-16px"></i>
              </button>
            </div>

            <!-- Dropdown List -->
            <div id="tag-dropdown-list"
              class="hidden absolute top-full left-0 w-full mt-1 bg-dark-panel border border-dark-border rounded-lg theme-card-shadow max-h-64 overflow-y-auto z-50">
              <!-- Items will be injected here by JS -->
            </div>
          </div>
          <div class="w-full sm:w-48">
            <label class="form-group-label">Area</label>
            <div class="relative">
              <select id="area-select" class="form-input appearance-none pr-10 cursor-pointer text-sm font-bold">
                <option>ALL</option>
                <option>BOILER-1</option>
                <option>BOILER-2</option>
                <option>BOILER-3</option>
                <option>BOILER-4</option>
              </select>
              <i
                class="ph-bold ph-caret-down absolute right-3.5 top-1/2 -translate-y-1/2 color-secondary pointer-events-none"></i>
            </div>
          </div>
          <button class="action-button btn-primary px-6" onclick="triggerSearch()">
            <i class="ph-bold ph-magnifying-glass"></i> Search
          </button>
        </div>

        <!-- Main Form Area -->
        <div id="view-mode-form" clas="space-y-6">
          <div class="form-section theme-card-shadow">
            <div class="section-title"><i class="ph-fill ph-tag"></i> General Information</div>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
              <div class="md:col-span-1">
                <label class="form-group-label">Tag No</label>
                <input type="text" class="form-input" id="f-tag_no" value="" readonly>
              </div>
              <div class="md:col-span-2">
                <label class="form-group-label">Description</label>
                <input type="text" class="form-input" id="f-description" value="" readonly>
              </div>
              <div class="md:col-span-1">
                <label class="form-group-label">Host</label>
                <input type="text" class="form-input" id="f-host" value="" readonly>
              </div>
            </div>
          </div>
          <div class="grid grid-cols-1 xl:grid-cols-2 gap-4 mb-4">
            <div class="form-section m-0 theme-card-shadow">
              <div class="section-title"><i class="ph-fill ph-cpu"></i> Controller & IO Module</div>
              <div class="grid grid-cols-2 gap-4 mb-4">
                <div><label class="form-group-label">Controller Type</label><input type="text" class="form-input"
                    id="f-ctrl_type" value="" readonly></div>
                <div><label class="form-group-label">Controller No</label><input type="text" class="form-input"
                    id="f-ctrl_no" value="" readonly></div>
              </div>
              <div class="grid grid-cols-3 gap-4">
                <div><label class="form-group-label">IO Type</label><input type="text" class="form-input" id="f-io_type"
                    value="" readonly></div>
                <div><label class="form-group-label">SW ID</label><input type="text" class="form-input" id="f-sw_id"
                    value="" readonly></div>
                <div><label class="form-group-label">Location</label><input type="text" class="form-input" id="f-io_loc"
                    value="" readonly></div>
              </div>
            </div>
            <div class="form-section m-0 theme-card-shadow">
              <div class="section-title"><i class="ph-fill ph-sliders-horizontal"></i> Calibration & Range
              </div>
              <div class="grid grid-cols-2 gap-4 mb-4">
                <div><label class="form-group-label">Channel</label><input type="text" class="form-input" id="f-channel"
                    value="" readonly></div>
                <div><label class="form-group-label">ESD Sheet</label><input type="text" class="form-input" id="f-esd"
                    value="" readonly></div>
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div><label class="form-group-label">Eng Range</label><input type="text" class="form-input"
                    id="f-eng_range" value="" readonly></div>
                <div><label class="form-group-label">Cal Range</label><input type="text" class="form-input"
                    id="f-cal_range" value="" readonly></div>
              </div>
            </div>
          </div>
          <div class="grid grid-cols-1 xl:grid-cols-2 gap-4 mb-4">
            <div class="form-section m-0 theme-card-shadow">
              <div class="section-title"><i class="ph-fill ph-warning-circle"></i> Trip Settings</div>
              <div class="grid grid-cols-2 gap-4 mb-4">
                <div><label class="form-group-label">Trip H/HH</label><input type="text" class="form-input"
                    id="f-trip_h" value="" readonly></div>
                <div><label class="form-group-label">Function</label><input type="text" class="form-input" id="f-func_h"
                    value="" readonly></div>
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div><label class="form-group-label">Trip L/LL</label><input type="text" class="form-input"
                    id="f-trip_l" value="" readonly></div>
                <div><label class="form-group-label">Function</label><input type="text" class="form-input" id="f-func_l"
                    value="" readonly></div>
              </div>
            </div>
            <div class="form-section m-0 theme-card-shadow">
              <div class="section-title"><i class="ph-fill ph-wrench"></i> Specifications</div>
              <div class="grid grid-cols-2 gap-4 mb-4">
                <div><label class="form-group-label">Loop Function</label><input type="text" class="form-input"
                    id="f-loop_func" value="" readonly></div>
                <div><label class="form-group-label">Inst Type</label><input type="text" class="form-input"
                    id="f-inst_type" value="" readonly></div>
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div><label class="form-group-label">Make</label><input type="text" class="form-input" id="f-make"
                    value="" readonly></div>
                <div><label class="form-group-label">Model</label><input type="text" class="form-input" id="f-model"
                    value="" readonly></div>
              </div>
            </div>
          </div>
          <div class="form-section theme-card-shadow">
            <div class="section-title"><i class="ph-fill ph-files"></i> Additional Details</div>
            <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-4">
              <div><label class="form-group-label">Logic</label><input type="text" class="form-input" id="f-logic"
                  value="" readonly></div>
              <div><label class="form-group-label">Accessory</label><input type="text" class="form-input"
                  id="f-accessory" value="" readonly></div>
              <div><label class="form-group-label">Loop Sheet</label><input type="text" class="form-input"
                  id="f-loop_sheet" value="" readonly></div>
              <div><label class="form-group-label">Spec</label><input type="text" class="form-input" id="f-spec"
                  value="" readonly></div>
              <div><label class="form-group-label">Helping Hand</label><input type="text" class="form-input"
                  id="f-helping" value="" readonly></div>
            </div>
            <div>
              <label class="form-group-label">Special Comment</label>
              <textarea class="form-input pt-2" id="f-comment" style="height: 5rem; resize: vertical;"
                readonly></textarea>
            </div>
          </div>
          <!-- Footer Actions -->
          <div class="action-toolbar">
            <button class="action-button" onclick="openJobHistoryModal()"><i
                class="ph-bold ph-clock-counter-clockwise"></i> Job History</button>
            <button class="action-button"
              onclick="window.location.href='/src/pages/boiler_jb_detail.html?tag=' + encodeURIComponent(document.getElementById('f-tag_no')?.value || 'L_110VDCBF')"><i
                class="ph-bold ph-list-dashes"></i> JS Detail</button>
            <span class="toolbar-divider"></span>
            <button class="action-button btn-add" onclick="window.location.href='/src/pages/boiler_inst_add.html'"><i
                class="ph-bold ph-plus"></i> Add</button>
            <button class="action-button btn-edit" onclick="showEditForm()"><i class="ph-bold ph-pencil-simple"></i>
              Edit</button>
            <button class="action-button btn-delete"><i class="ph-bold ph-trash"></i> Delete</button>
          </div>
        </div>

        <!-- ========== ADD/EDIT FORM (hidden by default) ========== -->
        <div id="edit-mode-form" class="hidden">
          <div class="form-section theme-card-shadow" style="border-color: #059669;">
            <div class="section-title" style="color: #10b981;"><i class="ph-fill ph-note-pencil"></i> <span
                id="edit-form-title">Add New Instrument</span></div>
            <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
              <div><label class="form-group-label">Area</label>
                <select class="form-input" id="ef-area">
                  <option>ALL</option>
                  <option>ASH</option>
                  <option>BOILER-1</option>
                  <option>BOILER-2</option>
                  <option>BOILER-3</option>
                  <option>BOILER-4</option>
                  <option>BOP</option>
                  <option>COMMON</option>
                  <option>CPSU/EMS</option>
                  <option>CPSU/GI</option>
                  <option>CPSU-U1</option>
                  <option>CRUSHINGS</option>
                  <option>NA STN</option>
                  <option>TG-1</option>
                  <option>TG-2</option>
                </select>
              </div>
              <div><label class="form-group-label">Tag No</label><input type="text" class="form-input" id="ef-tag_no">
              </div>
              <div class="md:col-span-2"><label class="form-group-label">Description</label><input type="text"
                  class="form-input" id="ef-description"></div>
              <div><label class="form-group-label">Host</label>
                <select class="form-input" id="ef-host">
                  <option></option>
                  <option>DCS</option>
                  <option>PLC</option>
                  <option>ESD</option>
                  <option>LOCAL</option>
                </select>
              </div>
            </div>
          </div>

          <div class="grid grid-cols-1 xl:grid-cols-2 gap-4 mb-4">
            <div class="form-section m-0 theme-card-shadow">
              <div class="section-title"><i class="ph-fill ph-cpu"></i> Controller</div>
              <div class="grid grid-cols-2 gap-4">
                <div><label class="form-group-label">Type</label><input type="text" class="form-input"
                    id="ef-ctrl_type"></div>
                <div><label class="form-group-label">No</label><input type="text" class="form-input" id="ef-ctrl_no">
                </div>
              </div>
            </div>
            <div class="form-section m-0 theme-card-shadow">
              <div class="section-title"><i class="ph-fill ph-cpu"></i> IO Module</div>
              <div class="grid grid-cols-3 gap-4">
                <div><label class="form-group-label">Type</label><input type="text" class="form-input" id="ef-io_type">
                </div>
                <div><label class="form-group-label">SW ID</label><input type="text" class="form-input" id="ef-sw_id">
                </div>
                <div><label class="form-group-label">Location</label><input type="text" class="form-input"
                    id="ef-io_loc"></div>
              </div>
            </div>
          </div>

          <div class="grid grid-cols-1 xl:grid-cols-2 gap-4 mb-4">
            <div class="form-section m-0 theme-card-shadow">
              <div class="grid grid-cols-2 gap-4">
                <div><label class="form-group-label">CH</label><input type="text" class="form-input" id="ef-channel">
                </div>
                <div><label class="form-group-label">ESD Sheet</label><input type="text" class="form-input" id="ef-esd">
                </div>
              </div>
            </div>
            <div class="form-section m-0 theme-card-shadow">
              <div class="grid grid-cols-2 gap-4">
                <div><label class="form-group-label">Eng Range</label><input type="text" class="form-input"
                    id="ef-eng_range"></div>
                <div><label class="form-group-label">Cal Range</label><input type="text" class="form-input"
                    id="ef-cal_range"></div>
              </div>
            </div>
          </div>

          <div class="form-section theme-card-shadow">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
              <div><label class="form-group-label">Trip H/HH</label><input type="text" class="form-input"
                  id="ef-trip_h"></div>

    function renderDropdown(filterText = "") {
      const filtered = allTags.filter(tag => tag.toLowerCase().includes(filterText.toLowerCase()));

      if (filtered.length === 0) {
        dropdownList.innerHTML = `<div class="p-3 text-sm text-slate-500 italic dark:text-slate-400">No tags found</div>`;
      } else {
        dropdownList.innerHTML = filtered.map(tag => `
                    <div class="px-4 py-2 text-sm text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 cursor-pointer font-bold transition-colors dropdown-item" data-tag="${tag}">
                        ${highlightText(tag, filterText)}
                    </div>
                `).join('');
      }

      // Add click listeners to items
      document.querySelectorAll('.dropdown-item').forEach(item => {
        item.addEventListener('click', (e) => {
          const tag = e.currentTarget.getAttribute('data-tag');
          searchInput.value = tag;
          dropdownList.classList.add('hidden');
          loadTagData(tag);
        });
      });
    }

    function highlightText(text, highlight) {
      if (!highlight.trim()) return text;
      const regex = new RegExp(`(${highlight})`, 'gi');
      return text.replace(regex, '<span class="text-blue-500 bg-blue-500/10">$1</span>');
    }

    // Event Listeners for Dropdown
    searchInput.addEventListener('input', (e) => {
      dropdownList.classList.remove('hidden');
      renderDropdown(e.target.value);
    });

      dropdownList.classList.remove('hidden');
      renderDropdown(searchInput.value);
    });

        const file = input.files[0];
        document.getElementById('history-preview-name').textContent = file.name;
        document.getElementById('history-preview-size').textContent = (file.size / 1024).toFixed(1) + ' KB';
        document.getElementById('history-file-preview').classList.remove('hidden');
        document.getElementById('history-file-preview').style.display = 'flex';
        document.getElementById('history-upload-zone').classList.add('hidden');
      }
    }

    function clearHistoryFile() {
      document.getElementById('history-file-input').value = '';
      document.getElementById('history-file-preview').classList.add('hidden');
      document.getElementById('history-upload-zone').classList.remove('hidden');
    }

    function saveHistoryAttach() {
      const fileInput = document.getElementById('history-file-input');
      if (fileInput.files && fileInput.files[0]) {
        const fileName = fileInput.files[0].name;
        if (currentAttachSlot === 1) {
          document.getElementById('jd-attach1-name').textContent = fileName;
        } else if (currentAttachSlot === 2) {
          document.getElementById('jd-attach2-name').textContent = fileName;
        }
      }
      closeHistoryAttachModal();
    }

  </script>
</body>

</html>
