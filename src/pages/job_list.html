    <script>
      const units = [
        "AA",
        "AAQM",
        "AMM",
        "ANIPF",
        "ANITDI",
        "ASGP",
        "BAGG",
        "BOILER",
        "CMS",
        "CPSU",
        "DM",
        "EA",
        "FA",
        "INSTWS",
        "M1",
        "M2",
        "MINMAX",
        "NPP",
        "SPP",
        "UREA",
      ];

      const jobGrid = document.getElementById("job-grid");

      // Tailwind styling for Javascript injection
      const cardClass =
        "flex items-center justify-center min-h-[3.5rem] border border-dark-border rounded-lg py-2 px-4 bg-dark-panel dark:hidden bg-white dark:hidden border-[#cbd5e1] dark:hidden hover:border-[#3b82f6] dark:hidden hover:bg-[#eff6ff] dark:hidden shadow-[0_1px_2px_rgba(0,0,0,0.05)] dark:hidden hover:shadow-[0_4px_12px_rgba(59,130,246,0.15)] no-underline transition-all duration-200 ease-in-out cursor-pointer shadow-[inset_0_1px_0_rgba(255,255,255,0.05)] hover:border-[rgba(87,148,242,0.5)] hover:bg-[rgba(87,148,242,0.1)] hover:-translate-y-0.5 hover:shadow-[0_4px_12px_rgba(87,148,242,0.15),inset_0_1px_0_rgba(255,255,255,0.1)] active:translate-y-0";
      const nameClass =
        "text-[1.05rem] font-bold color-primary dark:hidden text-[#334155] text-center tracking-wide";

      if (jobGrid) {
        jobGrid.innerHTML = units
          .map((unit) => {
            return `
                    <div class="${cardClass}" onclick="handleUnitClick('${unit}')">
                        <span class="${nameClass}">${unit}</span>
                    </div>
                `;
          })
          .join("");
      }

      function handleUnitClick(unit) {
        // Get selected filter state
        const selectedFilter =
          document.querySelector('input[name="jobFilter"]:checked')?.value ||
          "Unknown";
        console.log(`Clicked Unit: ${unit}, Mode: ${selectedFilter}`);

        // Navigate based on unit
        window.location.href = `/src/pages/job_list_detail.html?plant=${encodeURIComponent(unit)}&mode=${encodeURIComponent(selectedFilter)}`;
      }
