  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const showLoginFormBtn = document.getElementById('showLoginFormBtn');
      const cancelLoginBtn = document.getElementById('cancelLoginBtn');
      const closeModalBtn = document.getElementById('closeModalBtn');
      const loginModal = document.getElementById('loginModal');
      const loginModalContent = document.getElementById('loginModalContent');

      const loginFormContainer = loginModalContent.querySelector('form');
      const modalHeaderTitle = loginModalContent.querySelector('h4');
      const loginGoBtn = document.getElementById('loginGoBtn');
      const bypassParameterSection = document.getElementById('bypassParameterSection');
      const backToLoginBtn = document.getElementById('backToLoginBtn');

      const mainContentArea = document.querySelector('main');
      const heroSectionArea = document.querySelector('.modern-gradient');
      const bypassParameterDataView = document.getElementById('bypassParameterDataView');
      const areaSelectGoBtn = bypassParameterSection.querySelector('button.ml-1');
      const logoutBtn = document.getElementById('logoutBtn');

      // Helper function to show modal
      const openModal = () => {
        loginModal.classList.remove('hidden');
        // Reset to initial login view if it was changed
        resetToLoginView();
        // Small delay to allow display block to apply before animating opacity/transform
        setTimeout(() => {
          loginModalContent.classList.remove('scale-95', 'opacity-0');
          loginModalContent.classList.add('scale-100', 'opacity-100');
        }, 10);
      };

      // Helper function to hide modal
      const closeModal = () => {
        loginModalContent.classList.remove('scale-100', 'opacity-100');
        loginModalContent.classList.add('scale-95', 'opacity-0');
        // Wait for animation to finish before hiding element
        setTimeout(() => {
          loginModal.classList.add('hidden');
        }, 300);
      };

      // Helper to return modal to initial state
      const resetToLoginView = () => {
        loginFormContainer.classList.remove('hidden');
        modalHeaderTitle.classList.remove('hidden');
        bypassParameterSection.classList.add('hidden');
        // update padding
        loginModalContent.classList.replace('p-6', 'p-8');
      };

      if (showLoginFormBtn && loginModal) {
        showLoginFormBtn.addEventListener('click', openModal);

        if (cancelLoginBtn) {
          cancelLoginBtn.addEventListener('click', closeModal);
        }

        if (closeModalBtn) {
          closeModalBtn.addEventListener('click', closeModal);
        }

        // Handle "Go" click on login form
        if (loginGoBtn && bypassParameterSection) {
          loginGoBtn.addEventListener('click', () => {
            // Hide login form & header
            loginFormContainer.classList.add('hidden');
            modalHeaderTitle.classList.add('hidden');

            // Adjust modal padding for the new view layout to match image aesthetic better
            loginModalContent.classList.replace('p-8', 'p-6');

            // Show BYPASS PARAMETER section
            bypassParameterSection.classList.remove('hidden');
          });
        }

        // Handle "Go" click after selecting area
        if (areaSelectGoBtn) {
          areaSelectGoBtn.addEventListener('click', () => {
            window.location.href = '/src/pages/bypass_parameter.html';
          });
        }

        if (backToLoginBtn) {
          backToLoginBtn.addEventListener('click', resetToLoginView);
        }

        // Close when clicking outside
        loginModal.addEventListener('click', (e) => {
          if (e.target === loginModal) {
            closeModal();
          }
        });
      }
    });
  </script>
