<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loop Data | GNFC</title>
    <link rel="stylesheet" href="/src/css/ios-fonts.css">
    <link rel="stylesheet" href="/src/css/typography.css">
    <link rel="stylesheet" href="/src/css/table-style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="/src/js/tailwind_config.js"></script>
    <script>window.activePage = 'plants';</script>
    <style>
        .loop-card {
            background: var(--app-panel, rgba(15, 23, 42, 0.4));
            border: 1px solid var(--app-border, #2c3235);
            border-radius: 0.5rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            margin-bottom: 1.25rem;
        }

        .loop-card-header {
            background: rgba(15, 23, 42, 0.6);
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--app-border, #2c3235);
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--app-text, #e6edf3);
            text-align: center;
        }

        .loop-card-label {
            background: rgba(15, 23, 42, 0.6);
            width: 160px;
            padding: 0.75rem 1rem;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--app-text, #e6edf3);
            display: flex;
            align-items: center;
            border-right: 1px solid var(--app-border, #2c3235);
        }

        .loop-input {
            width: 100%;
            height: 2.25rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--app-border, #2c3235);
            border-radius: 0.375rem;
            padding: 0 0.875rem;
            color: var(--app-text, #e6edf3);
            font-size: 0.875rem;
            font-weight: 500;
            outline: none;
            transition: all 0.2s ease;
        }

        .loop-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
        }

        .loop-value {
            flex: 1;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--app-text, #e6edf3);
        }

        .loop-value input, .loop-value textarea {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--app-text, #e6edf3);
            font-size: 0.875rem;
            font-weight: 600;
        }

        .loop-value textarea {
            resize: vertical;
            min-height: 80px;
        }

        .loop-split {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .loop-split > div {
            border-right: 1px solid var(--app-border, #2c3235);
            display: flex;
            flex-direction: column;
        }

        .loop-split > div:last-child { 
            border-right: none; 
        }

        .btn-primary {
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 0.375rem;
            height: 2.25rem;
            padding: 0 1rem;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .btn-outline {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--app-border, #2c3235);
            color: var(--app-text, #e6edf3);
            border-radius: 0.375rem;
            height: 2.25rem;
            padding: 0 1rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.375rem;
        }

        .btn-outline:hover {
            background: rgba(30, 41, 59, 0.5);
        }

        /* Light Theme Overrides */
        html[data-theme-mode="light"] .loop-card {
            background: #ffffff;
            border-color: #d6deea;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }
        html[data-theme-mode="light"] .loop-card-header,
        html[data-theme-mode="light"] .loop-card-label {
            background: #f8fafc;
            border-color: #d6deea;
            color: #475569;
        }
        html[data-theme-mode="light"] .loop-split > div {
            border-color: #d6deea;
        }
        html[data-theme-mode="light"] .loop-input {
            background: #f8fafc;
            border-color: #cbd5e1;
            color: #1e293b;
        }
        html[data-theme-mode="light"] .loop-value,
        html[data-theme-mode="light"] .loop-value input,
        html[data-theme-mode="light"] .loop-value textarea {
            color: #1e293b;
        }
        html[data-theme-mode="light"] .btn-outline {
            background: #ffffff;
            border-color: #cbd5e1;
            color: #334155;
        }
        html[data-theme-mode="light"] .btn-outline:hover {
            background: #f1f5f9;
        }
    </style>
</head>

<body class="bg-dark-bg color-primary h-screen flex overflow-hidden font-sans">

    <script src="/src/js/theme_manager.js"></script>
    <script src="/src/js/sidebar.js"></script>
    <div id="sidebar-container"></div>
    <script>renderSidebar('plants');</script>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">

        <div id="header-container"></div>
        <script src="/src/js/header.js"></script>
        <script>
            renderHeader({
                title: "Loop Data",
                breadcrumbs: [
                    { label: "Plant", href: "/src/pages/plant_status.html" },
                    { label: "Boiler", href: "/src/pages/boiler_dashboard.html" },
                    { label: "Inst Data", href: "/src/pages/boiler_inst_data.html" },
                    { label: "Loop Data" }
                ],
                backLink: "/src/pages/boiler_inst_data.html"
            });
        </script>

        <div class="flex-1 overflow-y-auto p-4 md:p-6 bg-dark-bg">
            <div class="max-w-6xl mx-auto">

                <!-- Find Loop Bar -->
                <div class="loop-card p-4 flex flex-wrap items-center gap-4">
                    <label class="font-bold text-xs uppercase tracking-widest text-[#e6edf3]" style="color: var(--app-text, #e6edf3);">FIND LOOP</label>
                    <div class="flex items-center gap-2">
                        <input type="text" id="find-loop-input" class="loop-input w-56" placeholder="Enter loop..." value="">
                        <button class="btn-primary" onclick="findLoop()"><i class="ph-bold ph-magnifying-glass"></i></button>
                    </div>
                    <label class="font-bold text-xs uppercase tracking-widest text-[#e6edf3] ml-4" style="color: var(--app-text, #e6edf3);">AREA :</label>
                    <select id="area-select" class="loop-input w-40">
                        <option selected>ALL</option>
                        <option>BOILER-1</option><option>BOILER-2</option><option>BOILER-3</option><option>BOILER-4</option>
                        <option>BOP</option><option>COMMON</option><option>TG-1</option><option>TG-2</option>
                    </select>
                </div>

                <!-- Loop Name & Service -->
                <div class="loop-card flex flex-col">
                    <div class="flex border-b" style="border-color: var(--app-border, #2c3235);">
                        <div class="loop-card-label border-r" style="border-color: var(--app-border, #2c3235);">LOOP NAME :</div>
                        <div class="loop-value"><input type="text" id="loop-name" readonly></div>
                    </div>
                    <div class="flex">
                        <div class="loop-card-label border-r" style="border-color: var(--app-border, #2c3235);">SERVICE :</div>
                        <div class="loop-value"><input type="text" id="loop-service" readonly></div>
                    </div>
                </div>

                <!-- Loop Schematic & Special Document -->
                <div class="loop-card">
                    <div class="loop-split">
                        <div>
                            <div class="loop-card-header">LOOP SCHEMATIC</div>
                            <div class="flex-1 flex items-center justify-center p-4">
                                <span id="loop-schematic" class="text-sm font-semibold" style="color: var(--app-text, #e6edf3);"></span>
                            </div>
                        </div>
                        <div>
                            <div class="loop-card-header">SPECIAL DOCUMENT</div>
                            <div class="flex-1 flex items-center justify-center p-4">
                                <span id="loop-special-doc" class="text-sm font-semibold" style="color: var(--app-text, #e6edf3);"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Helpful Hints & Special Instructions -->
                <div class="loop-card">
                    <div class="loop-split">
                        <div>
                            <div class="loop-card-header">HELPFUL HINTS</div>
                            <div class="flex-1 p-4">
                                <textarea id="loop-hints" class="w-full h-full bg-transparent border-none outline-none resize-y min-h-20 text-sm font-semibold" style="color: var(--app-text, #e6edf3);" readonly></textarea>
                            </div>
                        </div>
                        <div>
                            <div class="loop-card-header">SPECIAL INSTRUCTIONS</div>
                            <div class="flex-1 p-4">
                                <textarea id="loop-instructions" class="w-full h-full bg-transparent border-none outline-none resize-y min-h-20 text-sm font-semibold" style="color: var(--app-text, #e6edf3);" readonly></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Loop Components Table -->
                <div class="loop-card flex flex-col">
                    <div class="loop-card-header">LOOP COMPONENTS</div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse" id="components-table">
                            <thead>
                                <tr class="border-b" style="border-color: var(--app-border, #2c3235); background: rgba(15, 23, 42, 0.2);">
                                    <th class="p-4 text-xs font-bold uppercase tracking-widest text-center w-[5%]" style="color: var(--app-text, #e6edf3);">SR</th>
                                    <th class="p-4 text-xs font-bold uppercase tracking-widest text-center w-[20%]" style="color: var(--app-text, #e6edf3);">TAG NO</th>
                                    <th class="p-4 text-xs font-bold uppercase tracking-widest text-center w-[35%]" style="color: var(--app-text, #e6edf3);">DESCRIPTION</th>
                                    <th class="p-4 text-xs font-bold uppercase tracking-widest text-center w-[20%]" style="color: var(--app-text, #e6edf3);">INST TYPE</th>
                                    <th class="p-4 text-xs font-bold uppercase tracking-widest text-center w-[20%]" style="color: var(--app-text, #e6edf3);">MAKE / MODEL</th>
                                </tr>
                            </thead>
                            <tbody id="components-body">
                                <tr>
                                    <td colspan="5" class="p-6 text-center italic text-sm text-gray-500">Search for a loop to view components</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Add button -->
                <div class="text-center mt-4">
                    <button class="btn-outline" onclick="alert('Add component feature coming soon')"><i class="ph-bold ph-plus"></i> Add</button>
                </div>

            </div>
        </div>
    </main>

    <script>
        // Mock Loop Data
        const loopDatabase = {
            "LS-10-101": {
                name: "MAIN STEAM PRESSURE LOOP",
                service: "STEAM HEADER PRESSURE MONITORING & CONTROL",
                schematic: "DWG-BLR-101-SCH",
                specialDoc: "SP-DOC-101",
                hints: "Check impulse tubing for blockage before calibration.\nEnsure manifold valve positions are correct.",
                instructions: "Use 2oo3 voting for trip functions.\nCalibrate at 0%, 25%, 50%, 75%, 100% of range.",
                components: [
                    { tag: "10-PT-101A", desc: "MAIN STEAM HEADER PRESSURE TX-A", type: "TRANSMITTER", make: "YOKOGAWA / EJA530A" },
                    { tag: "10-PT-101B", desc: "MAIN STEAM HEADER PRESSURE TX-B", type: "TRANSMITTER", make: "YOKOGAWA / EJA530A" },
                    { tag: "10-PT-101C", desc: "MAIN STEAM HEADER PRESSURE TX-C", type: "TRANSMITTER", make: "YOKOGAWA / EJA530A" },
                    { tag: "10-PI-101", desc: "MAIN STEAM PRESSURE INDICATOR", type: "GUAGE", make: "WIKA / 232.50" },
                ]
            },
            "LS-FG-101": {
                name: "FUEL GAS CONTROL LOOP",
                service: "NATURAL GAS FLOW CONTROL TO BURNERS",
                schematic: "DWG-BLR-FG-101",
                specialDoc: "",
                hints: "Verify gas pressure upstream of CV before testing.\nCheck positioner feedback signal.",
                instructions: "Stroke test CV quarterly.\nVerify tight shut-off during annual shutdown.",
                components: [
                    { tag: "XLGDFGV1D", desc: "FUEL GAS CV 1D", type: "CONTROL VALVE", make: "FISHER / DVC6200" },
                    { tag: "XLGDFGV1E", desc: "FUEL GAS CV 1E", type: "CONTROL VALVE", make: "FISHER / DVC6200" },
                    { tag: "XLGDFGV1F", desc: "FUEL GAS CV 1F", type: "CONTROL VALVE", make: "FISHER / DVC6200" },
                ]
            },
            "LS-C1-008": {
                name: "COMPRESSOR BEARING TEMPERATURE LOOP",
                service: "BEARING TEMPERATURE MONITORING",
                schematic: "DWG-COMP-008",
                specialDoc: "SP-COMP-MAINT-008",
                hints: "RTD wiring: 3-wire configuration.\nCheck for ambient temperature drift.",
                instructions: "High alarm: 110°C, Trip: 125°C.\nVerify thermowell integrity annually.",
                components: [
                    { tag: "ZT1777385", desc: "COMPRESSOR BEARING TEMP", type: "RTD PT100", make: "EMERSON / 3144P" },
                    { tag: "ZT1777393", desc: "COMPRESSOR BEARING TEMP BACKUP", type: "RTD PT100", make: "EMERSON / 3144P" },
                ]
            }
        };

        const findInput = document.getElementById('find-loop-input');

        findInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') findLoop();
        });

        function findLoop() {
            const query = findInput.value.trim().toUpperCase();
            const loop = loopDatabase[query];

            if (!loop) {
                // Try partial match
                const matchKey = Object.keys(loopDatabase).find(k => k.includes(query) || loopDatabase[k].name.toUpperCase().includes(query));
                if (matchKey) {
                    loadLoop(matchKey, loopDatabase[matchKey]);
                    findInput.value = matchKey;
                } else {
                    alert('Loop not found. Try: LS-10-101, LS-FG-101, or LS-C1-008');
                }
                return;
            }
            loadLoop(query, loop);
        }

        function loadLoop(id, data) {
            document.getElementById('loop-name').value = data.name;
            document.getElementById('loop-service').value = data.service;
            document.getElementById('loop-schematic').textContent = data.schematic || '—';
            document.getElementById('loop-special-doc').textContent = data.specialDoc || '—';
            document.getElementById('loop-hints').value = data.hints;
            document.getElementById('loop-instructions').value = data.instructions;

            const tbody = document.getElementById('components-body');
            if (data.components.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="p-6 text-center italic text-sm text-gray-500">No components found</td></tr>';
                return;
            }
            tbody.innerHTML = data.components.map((c, i) => `
                <tr class="border-b hover:bg-[rgba(15,23,42,0.3)] transition-colors cursor-pointer" style="border-color: var(--app-border, #2c3235);" onclick="window.location.href='/src/pages/boiler_inst_data.html?tag=${encodeURIComponent(c.tag)}'">
                    <td class="p-4 text-center text-sm font-semibold" style="color: var(--app-text, #e6edf3);">${i + 1}</td>
                    <td class="p-4 text-center text-sm font-bold text-blue-500">${c.tag}</td>
                    <td class="p-4 text-center text-sm font-semibold" style="color: var(--app-text, #e6edf3);">${c.desc}</td>
                    <td class="p-4 text-center text-sm font-semibold" style="color: var(--app-text, #e6edf3);">${c.type}</td>
                    <td class="p-4 text-center text-sm font-semibold" style="color: var(--app-text, #e6edf3);">${c.make}</td>
                </tr>
            `).join('');
        }

        // Check URL params
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const loopId = urlParams.get('loop');
            if (loopId && loopDatabase[loopId]) {
                findInput.value = loopId;
                loadLoop(loopId, loopDatabase[loopId]);
            }
        });
    </script>
</body>

</html>
