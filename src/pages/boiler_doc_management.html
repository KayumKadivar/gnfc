<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Management System | GNFC</title>
  <link rel="stylesheet" href="/src/css/ios-fonts.css">
  <link rel="stylesheet" href="/src/css/typography.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="/src/js/tailwind_config.js"></script>
  <script>window.activePage = 'plants';</script>
</head>

<body class="bg-dark-bg color-primary h-screen flex overflow-hidden font-sans">
  <script src="/src/js/theme_manager.js"></script>
  <script src="/src/js/sidebar.js"></script>
  <div id="sidebar-container"></div>
  <script>renderSidebar('plants');</script>

  <main class="flex-1 flex flex-col h-screen overflow-hidden">
    <div id="header-container"></div>
    <script src="/src/js/header.js"></script>
    <script>
      renderHeader({
        title: "Document Management System",
        breadcrumbs: [
          { label: "Plant", href: "/src/pages/plant_status.html" },
          { label: "Boiler", href: "/src/pages/boiler_dashboard.html" },
          { label: "Documents" }
        ],
        backLink: "/src/pages/boiler_dashboard.html"
      });
    </script>

    <div class="flex-1 overflow-y-auto bg-dark-bg p-4 md:p-8 flex items-center justify-center">
      <div class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-6 pb-20">
        
        <!-- Engineering Documentation Card -->
        <a href="/src/pages/boiler_doc_explorer.html?type=eng" class="group relative bg-dark-panel border border-dark-border rounded-2xl p-8 hover:border-blue-500/50 hover:shadow-[0_0_30px_rgba(59,130,246,0.15)] transition-all duration-300 flex flex-col items-center justify-center text-center overflow-hidden">
          <div class="absolute inset-0 bg-gradient-to-br from-blue-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
          
          <div class="h-20 w-20 rounded-2xl bg-blue-500/10 border border-blue-400/20 text-blue-400 flex items-center justify-center mb-6 group-hover:scale-110 transition-transform duration-300">
            <i class="ph-duotone ph-blueprint text-5xl"></i>
          </div>
          
          <h2 class="text-xl font-black text-dark-text tracking-tight mb-3 group-hover:text-blue-400 transition-colors">Engineering Documentation</h2>
          
          <p class="text-sm text-dark-muted leading-relaxed">
            Technical documents with revision control, mandatory comments, duplicate restrictions, and full audit flow.
          </p>
          
          <div class="mt-8 inline-flex items-center gap-2 text-[0.75rem] font-bold uppercase tracking-widest text-blue-400 group-hover:text-blue-300">
            Enter Library <i class="ph-bold ph-arrow-right group-hover:translate-x-1 transition-transform"></i>
          </div>
        </a>

        <!-- Other Documentation Card -->
        <a href="/src/pages/boiler_doc_explorer.html?type=comm" class="group relative bg-dark-panel border border-dark-border rounded-2xl p-8 hover:border-emerald-500/50 hover:shadow-[0_0_30px_rgba(16,185,129,0.15)] transition-all duration-300 flex flex-col items-center justify-center text-center overflow-hidden">
          <div class="absolute inset-0 bg-gradient-to-br from-emerald-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
          
          <div class="h-20 w-20 rounded-2xl bg-emerald-500/10 border border-emerald-400/20 text-emerald-400 flex items-center justify-center mb-6 group-hover:scale-110 transition-transform duration-300">
            <i class="ph-duotone ph-folders text-5xl"></i>
          </div>
          
          <h2 class="text-xl font-black text-dark-text tracking-tight mb-3 group-hover:text-emerald-400 transition-colors">Other Documentation</h2>
          
          <p class="text-sm text-dark-muted leading-relaxed">
            General documents, manuals, and records with standardized operations but no revision tracking.
          </p>
          
          <div class="mt-8 inline-flex items-center gap-2 text-[0.75rem] font-bold uppercase tracking-widest text-emerald-400 group-hover:text-emerald-300">
            Enter Library <i class="ph-bold ph-arrow-right group-hover:translate-x-1 transition-transform"></i>
          </div>
        </a>

      </div>
    </div>
  </main>
</body>

</html>
