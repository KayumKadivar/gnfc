<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Register | GNFC Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="/src/js/tailwind_config.js"></script>
  <link rel="stylesheet" href="/src/css/typography.css">
  <link rel="stylesheet" href="/src/css/modal-ui.css">
  <style>
    .glass-card {
      background-color: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(12px);
      border: 1px solid #cbd5e1;
    }

    .dark .glass-card {
      background-color: rgba(30, 41, 59, 0.95);
      border-color: #334155;
    }

    .label-pill {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #64748b;
      margin-bottom: 0.25rem;
      display: block;
    }

    .dark .label-pill {
      color: #94a3b8;
    }

    .accessible-input {
      width: 100%;
      background-color: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 0.375rem;
      padding: 0.5rem 0.75rem;
      font-size: 14px;
      font-weight: 600;
      color: #1e293b;
      outline: none;
      transition: all 0.2s ease;
      box-shadow: inset 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    }

    .dark .accessible-input {
      background-color: #1e293b;
      border-color: #475569;
      color: #f1f5f9;
    }

    .accessible-input:focus {
      border-color: #0f766e;
      box-shadow: 0 0 0 2px rgba(15, 118, 110, 0.1);
    }

    .accessible-textarea {
      width: 100%;
      background-color: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 0.375rem;
      padding: 0.75rem;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.5;
      color: #334155;
      outline: none;
      transition: all 0.2s ease;
      resize: none;
      height: 100%;
    }

    .dark .accessible-textarea {
      background-color: #0f172a / 50;
      border-color: #334155;
      color: #e2e8f0;
    }

    .accessible-textarea:focus {
      border-color: #14b8a6;
      background-color: #fff;
    }

    .dark .accessible-textarea:focus {
      background-color: #1e293b;
    }

    /* Hide scrollbar but allow scrolling */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>

<body class="page-bg font-sans text-slate-800 dark:text-slate-100 h-screen overflow-hidden flex flex-col transition-colors duration-300">
  <script src="/src/js/theme_manager.js"></script>

  <!-- Compact Nav -->
  <nav class="glass-card shrink-0 z-50 shadow-sm border-b overflow-hidden h-16 flex items-center px-6">
    <div class="flex items-center justify-between w-full">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-md bg-slate-800 flex items-center justify-center shadow-md">
          <i class="ph-bold ph-note-pencil text-white text-xl"></i>
        </div>
        <div>
          <h1 class="font-outfit font-black text-lg text-slate-800 dark:text-teal-400 tracking-tight leading-none uppercase">Job Register</h1>
          <p class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest leading-none mt-1">Instrument Department</p>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <a href="/src/pages/operation_job_register.html" class="flex items-center gap-2 px-4 py-2 rounded text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-teal-600 dark:hover:text-teal-400 transition-colors">
          <i class="ph-bold ph-arrow-left text-base"></i>
          <span>Portal Gateway</span>
        </a>
      </div>
    </div>
  </nav>

  <main class="flex-1 overflow-hidden flex flex-col p-4 gap-4">
    <!-- Top Action Bar -->
    <div class="glass-card rounded-lg p-3 flex flex-wrap items-center justify-between gap-4 shadow-sm border border-slate-200 dark:border-slate-800 shrink-0">
      <div class="flex items-center gap-4">
        <div class="bg-teal-600/10 dark:bg-teal-400/10 p-2 rounded border border-teal-500/20">
          <i class="ph-fill ph-factory text-teal-600 dark:text-teal-400 text-xl"></i>
        </div>
        <div>
          <h2 class="text-slate-800 dark:text-white font-outfit font-bold text-base tracking-tight leading-none uppercase">Nitro Phosphate Instrument</h2>
          <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mt-1">Live Job Status Monitor</p>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <div class="relative group">
          <i class="ph-bold ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 transition-colors text-base"></i>
          <input type="text" class="w-48 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded pl-9 pr-14 py-2 text-xs font-bold focus:border-teal-500 outline-none transition-all shadow-sm" placeholder="FIND JOB NO...">
          <button class="absolute right-1 top-1/2 -translate-y-1/2 bg-slate-800 dark:bg-slate-700 text-white text-[9px] font-black uppercase tracking-widest px-3 py-1.5 rounded hover:bg-teal-600 transition-all">Go</button>
        </div>
        <button id="addNewJobBtn" class="flex items-center gap-2 px-5 py-2 bg-teal-600 hover:bg-teal-700 text-white rounded font-black text-[10px] uppercase tracking-widest shadow-sm transition-all">
          <i class="ph-bold ph-plus-circle text-base"></i>
          <span>Add New</span>
        </button>
      </div>
    </div>

    <!-- Main Dashboard Container -->
    <div class="flex-1 flex flex-col gap-4 min-h-0">
      <!-- Metadata Grid -->
      <div class="glass-card rounded-lg p-4 grid grid-cols-1 xl:grid-cols-4 gap-6 shrink-0 border border-slate-200 dark:border-slate-800 bg-white/50 dark:bg-slate-900/50">
        <!-- Operation Details Cluster -->
        <div class="xl:col-span-2 grid grid-cols-4 gap-4">
          <div class="col-span-4 flex items-center gap-2 mb-1">
            <i class="ph-bold ph-user-gear text-teal-600"></i>
            <span class="text-[10px] font-black uppercase tracking-widest text-slate-500">Operation Details</span>
          </div>
          <div>
            <label class="label-pill">Tag No</label>
            <input type="text" class="accessible-input uppercase" value="NOTAG">
          </div>
          <div>
            <label class="label-pill">Date</label>
            <input type="text" class="accessible-input" value="1/9/2013">
          </div>
          <div>
            <label class="label-pill">Shift</label>
            <select class="accessible-input appearance-none bg-no-repeat bg-position-[right_0.5rem_center] bg-size-[1em_1em]" style="background-image: url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2232%22 height=%2232%22 viewBox=%220%22%3E%3Cpath fill=%22%2394a3b8%22 d=%22M21.5 13.5l-5.5 5.5-5.5-5.5%22/%3E%3C/svg%3E');">
              <option selected>A</option>
              <option>B</option>
              <option>C</option>
              <option>G</option>
            </select>
          </div>
          <div>
            <label class="label-pill">SE</label>
            <input type="text" class="accessible-input uppercase" value="AMP">
          </div>
        </div>

        <!-- Status Cluster -->
        <div class="xl:col-span-2 grid grid-cols-3 gap-4 border-l border-slate-200 dark:border-slate-800 pl-6">
          <div class="col-span-3 flex items-center gap-2 mb-1">
            <i class="ph-bold ph-wrench text-teal-600"></i>
            <span class="text-[10px] font-black uppercase tracking-widest text-slate-500">Instrument Status</span>
          </div>
          <div>
            <label class="label-pill">Target Date</label>
            <input type="text" class="accessible-input" placeholder="--/--/----">
          </div>
          <div>
            <label class="label-pill">IE Code</label>
            <input type="text" class="accessible-input uppercase" placeholder="---">
          </div>
          <div>
            <label class="label-pill">Status</label>
            <select class="accessible-input appearance-none font-bold text-teal-600 dark:text-teal-400 bg-no-repeat bg-position-[right_0.5rem_center] bg-size-[1em_1em]" style="background-image: url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2232%22 height=%2232%22 viewBox=%220%22%3E%3Cpath fill=%22%2394a3b8%22 d=%22M21.5 13.5l-5.5 5.5-5.5-5.5%22/%3E%3C/svg%3E');">
              <option selected disabled>Select...</option>
              <option>PENDING</option>
              <option>COMPLETED</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Split-Screen Textareas (Reduced Height) -->
      <div class="h-72 flex gap-4 shrink-0">
        <!-- Description -->
        <div class="flex-1 flex flex-col glass-card rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-sm overflow-hidden">
          <div class="px-4 py-2 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between bg-slate-50/50 dark:bg-slate-800/30">
            <h3 class="font-outfit font-extrabold text-slate-600 dark:text-slate-400 uppercase tracking-widest text-[10px]">Job Description</h3>
            <i class="ph-bold ph-pencil-circle text-lg text-teal-500 opacity-50"></i>
          </div>
          <div class="flex-1 p-3">
            <textarea class="accessible-textarea" placeholder="Enter job description...">PG129503 Machine exhaust pressure showing erratics.</textarea>
          </div>
        </div>

        <!-- Remarks -->
        <div class="w-1/3 flex flex-col glass-card rounded-lg border border-slate-200 dark:border-slate-800 bg-slate-50/30 dark:bg-slate-900/70 shadow-sm overflow-hidden">
          <div class="px-4 py-2 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between bg-slate-50/50 dark:bg-slate-800/30">
            <h3 class="font-outfit font-extrabold text-slate-600 dark:text-slate-400 uppercase tracking-widest text-[10px]">Remarks</h3>
            <i class="ph-bold ph-chats-circle text-lg text-slate-400 opacity-50"></i>
          </div>
          <div class="flex-1 p-3">
            <textarea class="accessible-textarea bg-transparent" placeholder="Operational remarks..."></textarea>
          </div>
        </div>
      </div>

      <!-- Footer Action Bar -->
      <div class="glass-card shrink-0 px-6 py-3 flex items-center justify-between border border-slate-200 dark:border-slate-800 bg-slate-50/80 dark:bg-slate-900/80 rounded-lg shadow-sm">
        <div class="flex items-center gap-3">
          <button class="w-9 h-9 rounded bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 flex items-center justify-center text-slate-400 hover:text-teal-600 transition-all shadow-sm" title="Prev">
            <i class="ph-bold ph-caret-left text-lg"></i>
          </button>
          
          <div class="flex items-center gap-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-4 py-1.5 rounded shadow-sm">
            <span class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">Record</span>
            <div class="flex items-center gap-1.5 font-mono">
              <input type="text" class="w-10 text-center font-bold text-sm text-teal-600 bg-transparent outline-none" value="109">
              <span class="text-slate-300">/</span>
              <span class="font-bold text-sm text-slate-500">109</span>
            </div>
          </div>

          <button class="w-9 h-9 rounded bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 flex items-center justify-center text-slate-400 hover:text-teal-600 transition-all shadow-sm" title="Next">
            <i class="ph-bold ph-caret-right text-lg"></i>
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- Add Job Modal -->
  <div id="addJobModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/70 backdrop-blur-md transition-all duration-300 p-4">
    <div id="addJobModalContent" class="relative w-full max-w-4xl bg-white dark:bg-slate-900 rounded-lg shadow-2xl border border-slate-200 dark:border-slate-700 transform scale-95 opacity-0 transition-all duration-300 overflow-hidden flex flex-col max-h-[90vh]">
      <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between bg-slate-50/50 dark:bg-slate-800/50">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded bg-teal-600 flex items-center justify-center shadow-lg">
            <i class="ph-bold ph-plus text-white text-xl"></i>
          </div>
          <div>
            <h4 class="font-outfit font-black text-lg text-slate-800 dark:text-white uppercase tracking-tight">New Job Entry</h4>
            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">Nitro Phosphate Instrument</p>
          </div>
        </div>
        <button id="closeAddModalBtn" class="w-10 h-10 rounded-full border border-slate-200 dark:border-slate-700 flex items-center justify-center text-slate-400 hover:bg-red-50 hover:text-red-500 transition-all">
          <i class="ph-bold ph-x text-lg"></i>
        </button>
      </div>

      <div class="p-6 overflow-y-auto no-scrollbar">
        <form class="grid grid-cols-1 md:grid-cols-4 gap-6">
          <div class="md:col-span-2">
            <label class="label-pill">Tag Identification</label>
            <input type="text" class="accessible-input" placeholder="Enter TAG NO (e.g. PG129503)">
          </div>
          <div>
            <label class="label-pill">Entry Date</label>
            <input type="date" class="accessible-input">
          </div>
          <div>
            <label class="label-pill">Shift</label>
            <select class="accessible-input">
              <option>A</option>
              <option>B</option>
              <option>C</option>
              <option selected>G</option>
            </select>
          </div>
          <div class="md:col-span-4">
            <label class="label-pill">Problem Description</label>
            <textarea class="accessible-input h-32 leading-relaxed font-medium" placeholder="Describe the problem in detail..."></textarea>
          </div>
          <div class="md:col-span-2">
            <label class="label-pill">Area Code</label>
            <input type="text" class="accessible-input uppercase" value="ANP-R">
          </div>
          <div class="md:col-span-2">
            <label class="label-pill">Assign SE</label>
            <input type="text" class="accessible-input uppercase" placeholder="Enter Engineer Code">
          </div>
        </form>
      </div>

      <div class="px-6 py-4 bg-slate-50 dark:bg-slate-800/80 border-t border-slate-100 dark:border-slate-800 flex justify-end gap-3">
        <button id="cancelAddJobBtn" class="px-6 py-2 text-[10px] font-black uppercase tracking-widest text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700 rounded transition-all">Cancel</button>
        <button id="saveJobBtn" class="px-8 py-2 bg-teal-600 hover:bg-teal-700 text-white rounded font-black text-[10px] uppercase tracking-widest shadow-lg transition-all">Save Entry</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const addNewJobBtn = document.getElementById('addNewJobBtn');
      const addJobModal = document.getElementById('addJobModal');
      const addJobModalContent = document.getElementById('addJobModalContent');
      const closeAddModalBtn = document.getElementById('closeAddModalBtn');
      const cancelAddJobBtn = document.getElementById('cancelAddJobBtn');
      const saveJobBtn = document.getElementById('saveJobBtn');

      const openModal = () => {
        addJobModal.classList.remove('hidden');
        setTimeout(() => {
          addJobModalContent.classList.remove('scale-95', 'opacity-0');
          addJobModalContent.classList.add('scale-100', 'opacity-100');
        }, 10);
      };

      const closeModal = () => {
        addJobModalContent.classList.remove('scale-100', 'opacity-100');
        addJobModalContent.classList.add('scale-95', 'opacity-0');
        setTimeout(() => {
          addJobModal.classList.add('hidden');
        }, 300);
      };

      if (addNewJobBtn) addNewJobBtn.addEventListener('click', openModal);
      if (closeAddModalBtn) closeAddModalBtn.addEventListener('click', closeModal);
      if (cancelAddJobBtn) cancelAddJobBtn.addEventListener('click', closeModal);
      if (saveJobBtn) saveJobBtn.addEventListener('click', closeModal);

      addJobModal.addEventListener('click', (e) => {
        if (e.target === addJobModal) closeModal();
      });
    });
  </script>
</body>

</html>
